name: Schema Validation

on:
  push:
    branches: [main]
    paths:
      - 'schemas/**'
      - 'status/**'
      - 'orchestration/schema_normalizer.py'
      - '.github/workflows/schema-validation.yml'
  pull_request:
    branches: [main]
    paths:
      - 'schemas/**'
      - 'status/**'
      - 'orchestration/schema_normalizer.py'
      - '.github/workflows/schema-validation.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install validator
        run: pip install jsonschema
      - name: Validate status artifacts
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import validate, ValidationError

          schema_dir = Path('schemas')
          status_dir = Path('status')
          mapping = {
              'schema-compliance.json': 'continuity-status.schema.json',
          }

          checked = 0
          violations = []
          for artifact_name, schema_name in mapping.items():
              artifact_path = status_dir / artifact_name
              schema_path = schema_dir / schema_name
              if not artifact_path.exists():
                  continue
              checked += 1
              try:
                  artifact = json.loads(artifact_path.read_text())
                  schema = json.loads(schema_path.read_text())
                  validate(instance=artifact, schema=schema)
              except (ValidationError, json.JSONDecodeError) as exc:
                  violations.append({'path': str(artifact_path), 'reason': str(exc)})

          result = {
              'schema_version': '1.0.0',
              'status_id': 'schema-compliance',
              'timestamp': __import__('datetime').datetime.utcnow().replace(microsecond=0).isoformat() + 'Z',
              'state': 'valid' if not violations else 'invalid',
              'checked_files': checked,
              'violations': violations,
              'notes': ['Generated by schema-validation workflow']
          }
          print(json.dumps(result, indent=2))
          Path('status/schema-compliance.json').write_text(json.dumps(result, indent=2) + '\n')
          if violations:
              raise SystemExit(1)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: schema-compliance
          path: status/schema-compliance.json
