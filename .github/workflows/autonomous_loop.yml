name: Autonomous Heartbeat Loop

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  ooda-cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests anthropic

      - name: Run OODA cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ABLY_KEY: ${{ secrets.ABLY_KEY }}
        run: python agents/ooda_cycle.py
