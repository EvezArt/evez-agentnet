name: evez-agentnet orchestrator

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-orchestrator:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env from secrets
        run: |
          cat > .env << EOF
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          TWITTER_BEARER_TOKEN=${{ secrets.TWITTER_BEARER_TOKEN }}
          GUMROAD_ACCESS_TOKEN=${{ secrets.GUMROAD_ACCESS_TOKEN }}
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          EVEZ_OS_PATH=../evez-os
          LOG_LEVEL=INFO
          MAX_DRAFTS_PER_ROUND=3
          MAX_SHIPS_PER_ROUND=2
          EOF

      - name: Run orchestrator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
        run: python orchestrator.py

      - name: Commit spine + logs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'agentnet: round ${{ github.run_number }} spine + logs'
          file_pattern: 'spine/*.jsonl shipper/ship_log.jsonl scanner/scan_results.jsonl predictor/predictions.jsonl worldsim/worldsim_state.json'
